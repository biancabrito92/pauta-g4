<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pauta Feed — G4 Educação</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0e1118;
  --surface:  #161b27;
  --s2:       #1c2333;
  --border:   #1e2840;
  --border2:  #273350;
  --text:     #e2e8f0;
  --text2:    #7a8aa0;
  --text3:    #3a4a60;
  --blue:     #3b82f6;
  --green:    #22c55e;
  --yellow:   #f59e0b;
  --red:      #ef4444;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOP BAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 12px;
}

.topbar h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
.topbar p  { font-size: 11px; color: var(--text2); margin-top: 1px; }

.topbar-right { display: flex; align-items: center; gap: 8px; }

.view-tabs {
  display: flex;
  background: var(--bg);
  border-radius: 7px;
  padding: 3px;
  border: 1px solid var(--border2);
}

.view-tab {
  padding: 4px 12px;
  border-radius: 5px;
  border: none;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  background: transparent;
  color: var(--text2);
  font-family: inherit;
  transition: all 0.12s;
}
.view-tab.active { background: var(--s2); color: var(--text); }

.btn {
  padding: 6px 14px;
  border-radius: 7px;
  border: none;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.12s;
}
.btn-primary { background: var(--blue); color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--s2); color: var(--text); }

/* ── FILTROS ── */
.filterbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 24px;
  height: 44px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
}

.filter-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; margin-right: 2px; }

.fchip {
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: transparent;
  font-size: 11px;
  color: var(--text2);
  cursor: pointer;
  white-space: nowrap;
  font-family: inherit;
  transition: all 0.12s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.fchip .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.fchip.active { border-color: var(--blue); background: rgba(59,130,246,0.15); color: #93c5fd; }
.fchip:hover:not(.active) { background: var(--s2); color: var(--text); }

.pct-badge {
  background: var(--s2);
  color: var(--text2);
  font-size: 10px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 10px;
  margin-left: 3px;
  letter-spacing: 0.2px;
}
.fchip.active .pct-badge { background: rgba(59,130,246,0.25); color: #93c5fd; }

/* ── GRID PRINCIPAL ── */
.main {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Wrapper com scroll */
.grid-scroll {
  flex: 1;
  overflow: auto;
  position: relative;
}

/* Tabela sticky */
.cal-table {
  border-collapse: collapse;
  width: 100%;
  min-width: 900px;
}

/* Cabeçalho de dias — sticky no topo */
.cal-table thead th {
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--surface);
  border-bottom: 2px solid var(--border2);
  border-right: 1px solid var(--border);
  padding: 10px 8px;
  text-align: center;
  white-space: nowrap;
}

.cal-table thead th:first-child {
  width: 58px;
  min-width: 58px;
  background: var(--bg);
  border-right: 2px solid var(--border2);
}

.th-day { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text2); }
.th-num { font-size: 24px; font-weight: 800; letter-spacing: -1px; color: var(--text); line-height: 1; margin-top: 2px; }
.th-count { font-size: 10px; color: var(--text3); margin-top: 3px; }
.th-count span { color: var(--blue); font-weight: 700; }

.col-weekend { background: #0c1016; }
.col-weekend .th-num { color: var(--text2); }

/* Células da grade */
.cal-table tbody td {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  padding: 3px;
  min-width: 120px;
}

.cal-table tbody td:first-child {
  /* coluna de horário */
  text-align: right;
  padding: 6px 10px 6px 4px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.3px;
  background: var(--bg);
  border-right: 2px solid var(--border2);
  white-space: nowrap;
  position: sticky;
  left: 0;
  z-index: 5;
  width: 58px;
  min-width: 58px;
}

.cal-table tbody tr:hover td { background: #0a0e15; }
.cal-table tbody tr:hover td:first-child { background: var(--bg); }

td.weekend-cell { background: #0b0f16; }

/* ── CARDS ── */
.pcard {
  border-radius: 7px;
  padding: 7px 9px 6px;
  margin-bottom: 3px;
  cursor: pointer;
  transition: all 0.1s;
  border-left: 3px solid var(--ec, #3a4a60);
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  position: relative;
}

.pcard:hover { background: var(--s2); border-top-color: var(--border2); border-right-color: var(--border2); border-bottom-color: var(--border2); }

.pcard-ed { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: var(--ec, var(--text2)); margin-bottom: 2px; }
.pcard-pauta { font-size: 11px; font-weight: 500; color: var(--text); line-height: 1.35; }
.pcard-pauta.empty { color: var(--text3); font-style: italic; font-weight: 400; }
.pcard-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
.pcard-resp { font-size: 10px; color: var(--text3); }

.pub-dot { color: var(--green); font-size: 8px; margin-left: 4px; vertical-align: middle; cursor: pointer; }
.pub-dot:hover { text-decoration: underline; }
.pcard.is-published { border-left-color: var(--green) !important; }
.pcard.is-published .pcard-ed { color: var(--green) !important; }

/* Drag and drop */
.pcard[draggable] { cursor: grab; }
.pcard[draggable]:active { cursor: grabbing; }
.pcard.dragging { opacity: 0.35; pointer-events: none; }
.drop-target { background: rgba(59,130,246,0.08) !important; outline: 2px dashed var(--blue); outline-offset: -2px; }

/* Botão rápido de link */
.pcard-addlink {
  display: none;
  margin-top: 5px;
  font-size: 10px;
  color: var(--text3);
  background: none;
  border: 1px dashed var(--border2);
  border-radius: 4px;
  padding: 2px 6px;
  cursor: pointer;
  width: 100%;
  text-align: left;
  transition: all 0.1s;
}
.pcard-addlink:hover { color: var(--green); border-color: var(--green); }
.pcard:hover .pcard-addlink { display: block; }

/* Mini popup de link */
.link-popup {
  position: fixed;
  background: var(--s1);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 9999;
  width: 300px;
  display: none;
}
.link-popup.open { display: block; }
.link-popup label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 6px; }
.link-popup input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  padding: 7px 10px;
  font-size: 12px;
  box-sizing: border-box;
}
.link-popup-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
.link-popup-actions button { font-size: 11px; padding: 4px 10px; border-radius: 5px; cursor: pointer; border: none; }
.lp-cancel { background: var(--s2); color: var(--text2); }
.lp-save { background: var(--green); color: #fff; font-weight: 700; }


.pcard-del {
  position: absolute;
  top: 4px; right: 4px;
  opacity: 0;
  font-size: 11px;
  color: var(--text3);
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 3px;
  transition: all 0.1s;
  background: var(--s2);
}
.pcard:hover .pcard-del { opacity: 1; }
.pcard-del:hover { color: var(--red) !important; }

.add-slot {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  width: 100%;
  padding: 4px;
  border-radius: 5px;
  border: 1px dashed var(--border);
  background: transparent;
  color: var(--text3);
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.1s;
  margin-top: 2px;
}
.add-slot:hover { border-color: var(--border2); color: var(--text2); background: var(--surface); }

/* ── LISTA VIEW ── */
.list-view { display: none; flex: 1; overflow-y: auto; padding: 20px 24px; }
.list-view.active { display: block; }

.list-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.list-table th {
  background: var(--surface);
  padding: 9px 12px;
  text-align: left;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text3);
  border-bottom: 2px solid var(--border2);
}
.list-table td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  color: var(--text);
}
.list-table tr:hover td { background: var(--surface); cursor: pointer; }
.list-sep td { background: var(--surface) !important; color: var(--text3); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; padding: 6px 12px; border-bottom: 1px solid var(--border2); }

.ed-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
}
.ed-tag::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 2px; background: var(--ec, #64748b); }

/* ── MODAL ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 100;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(5px);
}
.overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 26px;
  width: 420px;
  max-width: 95vw;
  box-shadow: 0 40px 80px rgba(0,0,0,0.7);
  animation: pop 0.16s ease;
}
@keyframes pop { from { opacity:0; transform: scale(0.96) translateY(6px); } to { opacity:1; transform: scale(1) translateY(0); } }

.modal-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.modal-head h2 { font-size: 16px; font-weight: 700; }
.modal-head p  { font-size: 12px; color: var(--text3); margin-top: 3px; }
.modal-x { background: var(--bg); border: 1px solid var(--border); color: var(--text2); border-radius: 7px; width: 30px; height: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.modal-x:hover { color: var(--text); }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 5px; }
.field input, .field select, .field textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 9px 11px;
  font-size: 13px;
  color: var(--text);
  outline: none;
  font-family: inherit;
  transition: border-color 0.12s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--blue); }
.field select option { background: var(--surface); }
.field textarea { resize: vertical; min-height: 64px; line-height: 1.5; }
.frow { display: flex; gap: 10px; }
.frow .field { flex: 1; margin-bottom: 0; }

.mactions { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
.mactions .right { display: flex; gap: 8px; }
.btn-del { background: transparent; color: var(--red); border: 1px solid rgba(239,68,68,0.25); padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
.btn-del:hover { background: rgba(239,68,68,0.1); }
.hint { font-size: 11px; color: var(--text3); text-align: center; margin-top: 8px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--s2); border: 1px solid var(--border2);
  color: var(--text); padding: 8px 18px; border-radius: 20px;
  font-size: 12px; font-weight: 500; opacity: 0;
  transition: all 0.22s; z-index: 300; pointer-events: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Badges de status na lista */
.badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; }

/* ── RESULTADOS ── */
.results-view { display: none; flex: 1; overflow-y: auto; padding: 24px 28px; }
.results-view.active { display: block; }

.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}

.results-header h2 { font-size: 15px; font-weight: 700; color: var(--text); }
.results-header p  { font-size: 12px; color: var(--text3); margin-top: 2px; }

.results-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text3);
  text-align: center;
  gap: 10px;
}
.results-empty .icon { font-size: 36px; opacity: 0.3; }
.results-empty p { font-size: 13px; line-height: 1.6; max-width: 340px; }
.results-empty strong { color: var(--text2); }

.results-summary {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: 28px;
}

.res-stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.res-stat .rs-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
.res-stat .rs-value { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); line-height: 1; }
.res-stat .rs-sub   { font-size: 11px; color: var(--text3); margin-top: 3px; }

.results-section { margin-bottom: 28px; }
.results-section h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 12px; }

/* Barras por editoria */
.ed-bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.ed-bar-label { font-size: 12px; color: var(--text2); width: 160px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ed-bar-track { flex: 1; background: var(--border); border-radius: 4px; height: 8px; overflow: hidden; }
.ed-bar-fill  { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
.ed-bar-meta  { font-size: 11px; color: var(--text3); width: 80px; text-align: right; flex-shrink: 0; }

/* Tabela de posts publicados */
.pub-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.pub-table th { background: var(--surface); padding: 8px 12px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); border-bottom: 2px solid var(--border2); }
.pub-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--text); }
.pub-table tr:hover td { background: var(--surface); }

/* Campos de resultado */
.res-input {
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 5px 8px;
  font-size: 12px;
  color: var(--text);
  width: 90px;
  font-family: inherit;
  outline: none;
  text-align: center;
}
.res-input:focus { border-color: var(--blue); }
.res-input::placeholder { color: var(--text3); }

.res-total {
  font-size: 11px;
  font-weight: 700;
  color: var(--green);
  white-space: nowrap;
}

.db-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(59,130,246,0.1);
  border: 1px solid rgba(59,130,246,0.25);
  color: #60a5fa;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
}
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div>
    <h1>Pauta Feed — G4 Educação</h1>
    <p>14 a 22 de março de 2026</p>
  </div>
  <div class="topbar-right">
    <div class="view-tabs">
      <button class="view-tab active" id="btn-cal"      onclick="setView('cal')">Calendário</button>
      <button class="view-tab"        id="btn-list"     onclick="setView('list')">Lista</button>
      <button class="view-tab"        id="btn-results"  onclick="setView('results')">Resultados</button>
    </div>
    <button class="btn btn-ghost"   onclick="exportCSV()">Exportar CSV</button>
    <button class="btn btn-primary" onclick="openAdd()">＋ Novo post</button>
  </div>
</div>

<!-- Filtros -->
<div class="filterbar" id="filterbar">
  <span class="filter-label">Filtrar:</span>
</div>

<!-- Conteúdo principal -->
<div class="main">

  <!-- CALENDÁRIO -->
  <div class="grid-scroll" id="cal-wrap">
    <table class="cal-table" id="cal-table">
      <thead id="cal-head"></thead>
      <tbody id="cal-body"></tbody>
    </table>
  </div>

  <!-- LISTA -->
  <div class="list-view" id="list-view">
    <table class="list-table" id="list-table">
      <thead><tr><th>Hora</th><th>Editoria</th><th>Resp.</th><th>Pauta</th><th>Link</th><th></th></tr></thead>
      <tbody id="list-body"></tbody>
    </table>
  </div>

  <!-- RESULTADOS -->
  <div class="results-view" id="results-view"></div>

</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <div><h2 id="m-title">Novo post</h2><p id="m-ctx"></p></div>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>

    <div class="frow">
      <div class="field">
        <label>Data</label>
        <select id="f-date">
          <option value="14/03/2026">14 – Sábado</option>
          <option value="15/03/2026">15 – Domingo</option>
          <option value="16/03/2026">16 – Segunda</option>
          <option value="17/03/2026">17 – Terça</option>
          <option value="18/03/2026">18 – Quarta</option>
          <option value="19/03/2026">19 – Quinta</option>
          <option value="20/03/2026">20 – Sexta</option>
          <option value="21/03/2026">21 – Sábado</option>
          <option value="22/03/2026">22 – Domingo</option>
        </select>
      </div>
      <div class="field">
        <label>Horário</label>
        <input type="time" id="f-hora" value="12:00" />
      </div>
    </div>

    <div class="frow">
      <div class="field">
        <label>Editoria</label>
        <select id="f-ed">
          <option>IA</option>
          <option>Radar do empresário</option>
          <option>Ecossistema G4</option>
          <option>Rebranding</option>
          <option>Legado</option>
          <option>Erro ao aprendizado</option>
          <option>Outros</option>
        </select>
      </div>
      <div class="field">
        <label>Responsável</label>
        <select id="f-resp">
          <option>G4</option>
          <option>INC</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Pauta / Conteúdo</label>
      <textarea id="f-pauta" placeholder="Descreva o conteúdo…"></textarea>
    </div>

    <div class="field">
      <label>Link do post (após publicar)</label>
      <input type="url" id="f-link" placeholder="https://instagram.com/p/..." />
    </div>

    <p class="hint">⌘ Enter para salvar · ESC para fechar</p>

    <div class="mactions">
      <button class="btn-del" id="m-del" style="display:none" onclick="deletePost()">Excluir</button>
      <div class="right">
        <button class="btn btn-ghost"   onclick="closeModal()">Cancelar</button>

// ── RENDER CALENDÁRIO ─────────────────────────────────────────────────────────
function renderCal() {
  // Cabeçalho
  let headHtml = '<tr><th></th>';
  DAYS.forEach(d => {
    const cnt = posts.filter(p => p.date === d.date && (activeFilter === 'all' || p.editoria === activeFilter)).length;
    const wk = d.wk ? 'col-weekend' : '';
    headHtml += `<th class="${wk}">
      <div class="th-day">${d.wd}</div>
      <div class="th-num">${d.num}</div>
      <div class="th-count"><span>${cnt}</span> post${cnt!==1?'s':''}</div>
    </th>`;
  });
  headHtml += '</tr>';
  document.getElementById('cal-head').innerHTML = headHtml;

  // Linhas de horário
  let bodyHtml = '';
  HOURS.forEach(hora => {
    bodyHtml += `<tr><td>${hora}</td>`;
    DAYS.forEach(d => {
      const wk = d.wk ? 'weekend-cell' : '';
      const items = filtered(d.date, hora);
      let cells = items.map(p => {
        const sc = p.status === 'OK' ? 's-ok' : p.status === 'Revisão' ? 's-rev' : '';
        const pubDot = p.link
        ? `<span class="pub-dot" title="Abrir post" onclick="event.stopPropagation();window.open('${p.link}','_blank')">↗</span>`
        : '';
        const addLinkBtn = !p.link
        ? `<button class="pcard-addlink" onclick="event.stopPropagation();openLinkPopup(${p.id},this)">＋ link do post</button>`
        : '';
        return `<div class="pcard ${p.link?'is-published':''}" style="--ec:${color(p.editoria)}"
            draggable="true"
            data-id="${p.id}"
            ondragstart="dragStart(event,${p.id})"
            ondragend="dragEnd(event)"
            onclick="openEdit(${p.id})">
          <div class="pcard-ed">${p.editoria}${pubDot}</div>
          <div class="pcard-pauta ${!p.pauta?'empty':''}">${p.pauta||'—'}</div>
          <div class="pcard-meta">
            <span class="pcard-resp">${p.resp}</span>
          </div>
          ${addLinkBtn}
          <span class="pcard-del" onclick="event.stopPropagation();delPost(${p.id})">✕</span>
        </div>`;
      }).join('');
      cells += `<button class="add-slot" onclick="openAddSlot('${d.date}','${hora}')">＋</button>`;
      bodyHtml += `<td class="${wk}" data-date="${d.date}" data-hora="${hora}"
        ondragover="dragOver(event)"
        ondragleave="dragLeave(event)"
        ondrop="drop(event)">${cells}</td>`;
    });
    bodyHtml += '</tr>';
  });
  document.getElementById('cal-body').innerHTML = bodyHtml;
}

// ── RENDER LISTA ──────────────────────────────────────────────────────────────
function renderList() {
  const fps = posts
    .filter(p => activeFilter === 'all' || p.editoria === activeFilter)
    .sort((a,b) => a.date.localeCompare(b.date)||a.hora.localeCompare(b.hora));

  let html = '', lastDate = '';
  fps.forEach(p => {
    if (p.date !== lastDate) {
      const d = DAYS.find(x => x.date === p.date);
      html += `<tr class="list-sep"><td colspan="6">${d.full} ${d.num}/03</td></tr>`;
      lastDate = p.date;
    }
    html += `<tr onclick="openEdit(${p.id})">
      <td style="color:var(--text2);font-size:12px;white-space:nowrap">${p.hora}</td>
      <td><span class="ed-tag" style="--ec:${color(p.editoria)}">${p.editoria}</span></td>
      <td style="color:var(--text2);font-size:12px">${p.resp}</td>
      <td>${p.pauta||'<span style="color:var(--text3);font-style:italic">—</span>'}</td>
      <td>${p.link ? `<a href="${p.link}" target="_blank" style="color:var(--green);font-size:11px;text-decoration:none" onclick="event.stopPropagation()">Ver post</a>` : '<span style="color:var(--text3);font-size:11px">—</span>'}</td>
      <td><button class="btn btn-ghost" style="padding:3px 9px;font-size:11px" onclick="event.stopPropagation();openEdit(${p.id})">Editar</button></td>
    </tr>`;
  });
  document.getElementById('list-body').innerHTML = html;
}

function renderFilters() {
  const total = posts.length;
  const FILTERS = [
    { key: 'all',                  label: 'Todas',              color: null       },
    { key: 'IA',                   label: 'IA',                 color: '#a855f7'  },
    { key: 'Radar do empresário',  label: 'Radar',              color: '#3b82f6'  },
    { key: 'Ecossistema G4',       label: 'Ecossistema G4',     color: '#22c55e'  },
    { key: 'Rebranding',           label: 'Rebranding',         color: '#f43f5e'  },
    { key: 'Legado',               label: 'Legado',             color: '#fb923c'  },
    { key: 'Erro ao aprendizado',  label: 'Erro ao aprendizado',color: '#f59e0b'  },
  ];

  const bar = document.getElementById('filterbar');
  bar.innerHTML = '<span class="filter-label">Filtrar:</span>';

  FILTERS.forEach(f => {
    const count = f.key === 'all' ? total : posts.filter(p => p.editoria === f.key).length;
    const pct   = f.key === 'all' ? 100 : Math.round((count / total) * 100);
    const isActive = activeFilter === f.key;
    const dot  = f.color ? `<span class="dot" style="background:${f.color}"></span>` : '';
    const badge = f.key !== 'all'
      ? `<span class="pct-badge">${pct}%</span>`
      : `<span class="pct-badge">${total}</span>`;

    const btn = document.createElement('button');
    btn.className = 'fchip' + (isActive ? ' active' : '');
    btn.dataset.f = f.key;
    btn.onclick = () => setFilter(f.key);
    btn.innerHTML = `${dot}${f.label}${badge}`;
    bar.appendChild(btn);
  });
}

function renderResults() {
  const el = document.getElementById('results-view');
  const published = posts.filter(p => p.link);
  const total     = posts.length;

  // Cabeçalho
  let html = `<div class="results-header">
    <div>
      <h2>Resultados por editoria</h2>
      <p>${published.length} de ${total} posts publicados com link registrado</p>
    </div>
    <span class="db-badge">⬡ Databricks — aguardando conexão</span>
  </div>`;

  if (published.length === 0) {
    html += `<div class="results-empty">
      <div class="icon">📊</div>
      <p>Nenhum post publicado ainda.<br>
      Depois de publicar, edite o card e cole a URL do post.<br>
      Os resultados aparecerão aqui para preenchimento manual<br>
      — e quando o <strong>Databricks</strong> estiver ativo, serão puxados automaticamente.</p>
    </div>`;
    el.innerHTML = html;
    return;
  }

  // Sumário geral
  const totalAlc  = published.reduce((s,p) => s + (Number(p.alcance)||0), 0);
  const totalEng  = published.reduce((s,p) => s + (Number(p.engajamento)||0), 0);
  const totalLeads= published.reduce((s,p) => s + (Number(p.leads)||0), 0);

  html += `<div class="results-summary">
    <div class="res-stat">
      <div class="rs-label">Posts publicados</div>
      <div class="rs-value">${published.length}</div>
      <div class="rs-sub">de ${total} planejados</div>
    </div>
    <div class="res-stat">
      <div class="rs-label">Alcance total</div>
      <div class="rs-value">${totalAlc > 0 ? totalAlc.toLocaleString('pt-BR') : '—'}</div>
      <div class="rs-sub">impressões somadas</div>
    </div>
    <div class="res-stat">
      <div class="rs-label">Engajamento total</div>
      <div class="rs-value">${totalEng > 0 ? totalEng.toLocaleString('pt-BR') : '—'}</div>
      <div class="rs-sub">interações somadas</div>
    </div>
    <div class="res-stat">
      <div class="rs-label">Leads gerados</div>
      <div class="rs-value">${totalLeads > 0 ? totalLeads.toLocaleString('pt-BR') : '—'}</div>
      <div class="rs-sub">atribuídos ao social</div>
    </div>
  </div>`;

  // Barras por editoria
  const edCount = {};
  const edAlc   = {};
  published.forEach(p => {
    edCount[p.editoria] = (edCount[p.editoria]||0) + 1;
    edAlc[p.editoria]   = (edAlc[p.editoria]||0) + (Number(p.alcance)||0);
  });
  const maxCount = Math.max(...Object.values(edCount), 1);

  html += `<div class="results-section"><h3>Posts publicados por editoria</h3>`;
  Object.entries(edCount).sort((a,b) => b[1]-a[1]).forEach(([ed, n]) => {
    const pct  = Math.round((n / published.length) * 100);
    const barW = Math.round((n / maxCount) * 100);
    const alc  = edAlc[ed] > 0 ? edAlc[ed].toLocaleString('pt-BR') + ' alc.' : '—';
    html += `<div class="ed-bar-row">
      <div class="ed-bar-label" title="${ed}">${ed}</div>
      <div class="ed-bar-track"><div class="ed-bar-fill" style="width:${barW}%;background:${color(ed)}"></div></div>
      <div class="ed-bar-meta">${n} posts · ${pct}% · ${alc}</div>
    </div>`;
  });
  html += `</div>`;

  // Tabela de posts publicados com campos editáveis
  html += `<div class="results-section"><h3>Posts publicados — preencha os resultados</h3>
  <table class="pub-table">
    <thead><tr>
      <th>Data</th><th>Hora</th><th>Editoria</th><th>Pauta</th>
      <th>Alcance</th><th>Engajamento</th><th>Leads</th><th>Link</th>
    </tr></thead><tbody>`;

  published
    .sort((a,b) => a.date.localeCompare(b.date)||a.hora.localeCompare(b.hora))
    .forEach(p => {
      const d = DAYS.find(x => x.date === p.date);
      html += `<tr>
        <td style="color:var(--text2);white-space:nowrap">${d ? d.full + ' ' + d.num : p.date}</td>
        <td style="color:var(--text2)">${p.hora}</td>
        <td><span class="ed-tag" style="--ec:${color(p.editoria)}">${p.editoria}</span></td>
        <td>${p.pauta||'—'}</td>
        <td><input class="res-input" type="number" placeholder="0" value="${p.alcance||''}" onchange="updateMetric(${p.id},'alcance',this.value)" /></td>
        <td><input class="res-input" type="number" placeholder="0" value="${p.engajamento||''}" onchange="updateMetric(${p.id},'engajamento',this.value)" /></td>
        <td><input class="res-input" type="number" placeholder="0" value="${p.leads||''}" onchange="updateMetric(${p.id},'leads',this.value)" /></td>
        <td><a href="${p.link}" target="_blank" style="color:var(--green);text-decoration:none;font-size:11px">Ver post ↗</a></td>
      </tr>`;
    });

  html += `</tbody></table></div>`;
  el.innerHTML = html;
}

function updateMetric(id, field, value) {
  const i = posts.findIndex(x => x.id === id);
  if (i >= 0) {
    posts[i][field] = value ? Number(value) : 0;
    persist();
    // Re-render só o header de sumário sem resetar os inputs
    renderResults();
  }
}

function render() { renderFilters(); renderCal(); renderList(); }

  document.getElementById('btn-cal').classList.toggle('active',     v==='cal');
  document.getElementById('btn-list').classList.toggle('active',    v==='list');
  document.getElementById('btn-results').classList.toggle('active', v==='results');
  document.getElementById('cal-wrap').style.display    = v==='cal'     ? '' : 'none';
  document.getElementById('list-view').classList.toggle('active',   v==='list');
  document.getElementById('results-view').classList.toggle('active', v==='results');
  if (v === 'results') renderResults();
}

function setFilter(f) {
  activeFilter = f;
  render();
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openAdd() {
  editingId = null;
  document.getElementById('m-title').textContent = 'Novo post';
  document.getElementById('m-ctx').textContent = '';
  document.getElementById('f-date').value = '16/03/2026';
  document.getElementById('f-hora').value = '12:00';
  document.getElementById('f-ed').value   = 'Radar do empresário';
  document.getElementById('f-resp').value  = 'INC';
  document.getElementById('f-pauta').value = '';
  document.getElementById('f-link').value  = '';
  document.getElementById('m-del').style.display = 'none';
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-pauta').focus(),60);
}

function openAddSlot(date, hora) {
  openAdd();
  document.getElementById('f-date').value = date;
  document.getElementById('f-hora').value = hora;
}

function openEdit(id) {
  const p = posts.find(x=>x.id===id);
  if (!p) return;
  editingId = id;
  const d = DAYS.find(x=>x.date===p.date);
  document.getElementById('m-title').textContent = 'Editar post';
  document.getElementById('m-ctx').textContent   = `${d.full} ${d.num} · ${p.editoria}`;
  document.getElementById('f-date').value   = p.date;
  document.getElementById('f-hora').value   = p.hora;
  document.getElementById('f-ed').value     = p.editoria;
  document.getElementById('f-resp').value   = p.resp;
  document.getElementById('f-pauta').value  = p.pauta;
  document.getElementById('f-link').value   = p.link || '';
  document.getElementById('m-del').style.display = '';
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-pauta').focus(),60);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
}

function savePost() {
  const item = {
    date:     document.getElementById('f-date').value,
    hora:     document.getElementById('f-hora').value,
    editoria: document.getElementById('f-ed').value,
    resp:     document.getElementById('f-resp').value,
    pauta:    document.getElementById('f-pauta').value.trim(),
    link:     document.getElementById('f-link').value.trim(),
    status:   '',
  };
  if (editingId !== null) {
    const i = posts.findIndex(x=>x.id===editingId);
    if (i>=0) posts[i] = {...posts[i],...item};
    toast('Atualizado!');
  } else {
    item.id = nextId++;
    posts.push(item);
    toast('Post adicionado!');
  }
  persist(); closeModal(); render();
}

// ── DRAG AND DROP ─────────────────────────────────────────────────────────────
let draggingId = null;

function dragStart(event, id) {
  draggingId = id;
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('text/plain', id);
  // Pequeno delay para o browser renderizar antes de esconder o card
  setTimeout(() => {
    const el = document.querySelector(`.pcard[data-id="${id}"]`);
    if (el) el.classList.add('dragging');
  }, 0);
}

function dragEnd(event) {
  draggingId = null;
  document.querySelectorAll('.pcard.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
}

function dragOver(event) {
  event.preventDefault();
  event.dataTransfer.dropEffect = 'move';
  const td = event.currentTarget;
  td.classList.add('drop-target');
}

function dragLeave(event) {
  // Só remove se sair realmente da célula (não de um filho)
  const td = event.currentTarget;
  if (!td.contains(event.relatedTarget)) {
    td.classList.remove('drop-target');
  }
}

function drop(event) {
  event.preventDefault();
  const td = event.currentTarget;
  td.classList.remove('drop-target');
  const id = parseInt(event.dataTransfer.getData('text/plain'));
  const newDate = td.dataset.date;
  const newHora = td.dataset.hora;
  if (!newDate || !newHora || isNaN(id)) return;
  const i = posts.findIndex(x => x.id === id);
  if (i < 0) return;
  const old = posts[i];
  if (old.date === newDate && old.hora === newHora) return; // sem mudança
  posts[i] = { ...old, date: newDate, hora: newHora };
  persist();
  render();
  const d = DAYS.find(x => x.date === newDate);
  toast(`Movido para ${d ? d.full + ' ' + d.num : newDate} · ${newHora}`);
}

// ── LINK RÁPIDO ───────────────────────────────────────────────────────────────
let linkPopupId = null;

function openLinkPopup(id, btn) {
  linkPopupId = id;
  const p = posts.find(x=>x.id===id);
  const popup = document.getElementById('link-popup');
  const input = document.getElementById('lp-input');
  input.value = p.link || '';

  // Posiciona próximo ao botão clicado
  const rect = btn.getBoundingClientRect();
  popup.style.top = (rect.bottom + 6 + window.scrollY) + 'px';
  let left = rect.left + window.scrollX;
  if (left + 310 > window.innerWidth) left = window.innerWidth - 315;
  popup.style.left = Math.max(5, left) + 'px';

  popup.classList.add('open');
  setTimeout(() => { input.focus(); input.select(); }, 50);
}

function closeLinkPopup() {
  document.getElementById('link-popup').classList.remove('open');
  linkPopupId = null;
}

function saveLinkPopup() {
  if (linkPopupId === null) return;
  const val = document.getElementById('lp-input').value.trim();
  const i = posts.findIndex(x=>x.id===linkPopupId);
  if (i >= 0) { posts[i].link = val; }
  persist(); render();
  closeLinkPopup();
  toast(val ? 'Link salvo!' : 'Link removido');
}

// Fechar popup ao clicar fora
document.addEventListener('click', function(e) {
  const popup = document.getElementById('link-popup');
  if (popup && popup.classList.contains('open') && !popup.contains(e.target)) {
    closeLinkPopup();
  }
});

// Enter para salvar no popup
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('link-popup').classList.contains('open')) {
    saveLinkPopup();
  }
  if (e.key === 'Escape' && document.getElementById('link-popup').classList.contains('open')) {
    closeLinkPopup();
  }
});

function delPost(id) {
  if (!confirm('Remover este post?')) return;
  posts = posts.filter(x=>x.id!==id);
  persist(); render(); toast('Removido.');
}

function deletePost() {
  if (editingId===null) return;
  delPost(editingId); closeModal();
}

function exportCSV() {
  const h = 'DIA,HORÁRIO,EDITORIA,RESPONSÁVEL,PAUTA,STATUS';
  const rows = [...posts].sort((a,b)=>a.date.localeCompare(b.date)||a.hora.localeCompare(b.hora))
    .map(p=>[p.date,p.hora,p.editoria,p.resp,`"${p.pauta.replace(/"/g,'""')}"`,p.status].join(','));
  const blob = new Blob(['\ufeff'+[h,...rows].join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='pauta-g4-mar.csv'; a.click();
  toast('CSV exportado!');
}

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal();
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter') savePost();
});

render();
</script>
